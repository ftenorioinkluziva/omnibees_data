name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host %s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n' \
            "${{ secrets.VPS_HOST }}" >> ~/.ssh/config

      - name: Validate secrets
        run: |
          if echo "${{ secrets.VPS_HOST }}" | grep -q 'BEGIN'; then
            echo "ERROR: VPS_HOST parece conter uma chave SSH em vez do hostname/IP."
            exit 1
          fi
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "ERROR: VPS_HOST ou VPS_USER estao vazios."
            exit 1
          fi

      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='omnibees_data/' \
            --exclude='*.pyc' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/omnibees_data/

      - name: Rebuild and restart containers
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /opt/omnibees_data
            docker build -t omnibees-data:latest .
            docker rm -f omnibees-api omnibees-cron || true
            docker run -d --name omnibees-api --restart unless-stopped \
              --env-file .env -p 8000:8000 omnibees-data:latest api
            docker run -d --name omnibees-cron --restart unless-stopped \
              --env-file .env omnibees-data:latest cron
            docker ps --format 'table {{.Names}}\t{{.Status}}'
          EOF
